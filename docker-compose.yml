services:
  # 前端服务（Nginx + 前端静态文件）
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network

  # 后端服务（Python WebSocket 服务）
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "5680:5680"
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
